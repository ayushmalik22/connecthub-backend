<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub API Testing</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-top: 0;
            text-align: center;
        }

        .section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #f9f9f9;
        }

        .section h2 {
            color: #667eea;
            margin-top: 0;
        }

        .input-group {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input,
        textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            flex: 1;
            min-width: 200px;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .response {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .success {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }

        .error {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .token {
            background: #e3f2fd;
            border-left-color: #2196f3;
            margin: 20px 0;
            padding: 15px;
            border-radius: 4px;
            word-break: break-all;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status.ok {
            background: #4caf50;
            color: white;
        }

        .status.error {
            background: #f44336;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 ConnectHub API Testing</h1>

        <!-- Health Check -->
        <div class="section">
            <h2>Health Check</h2>
            <button onclick="testHealth()">Test Health Endpoint</button>
            <div id="healthResponse" class="response"></div>
        </div>

        <!-- Register User -->
        <div class="section">
            <h2>Register User</h2>
            <div class="input-group">
                <input type="text" id="regUsername" placeholder="Username" value="testuser">
                <input type="email" id="regEmail" placeholder="Email" value="test@example.com">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Password" value="Test123!">
                <input type="password" id="regConfirm" placeholder="Confirm Password" value="Test123!">
            </div>
            <button onclick="testRegister()">Register</button>
            <div id="registerResponse" class="response"></div>
        </div>

        <!-- Login User -->
        <div class="section">
            <h2>Login User</h2>
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email" value="test@example.com">
                <input type="password" id="loginPassword" placeholder="Password" value="Test123!">
            </div>
            <button onclick="testLogin()">Login</button>
            <div id="loginResponse" class="response"></div>
        </div>

        <!-- Token Storage -->
        <div class="section">
            <h2>Auth Token</h2>
            <div class="token" id="tokenDisplay">No token stored. Login first!</div>
            <button onclick="copyToken()">Copy Token</button>
            <button onclick="clearToken()">Clear Token</button>
        </div>

        <!-- Get All Users -->
        <div class="section">
            <h2>Get All Users</h2>
            <button onclick="testGetAllUsers()">Fetch All Users</button>
            <div id="getAllResponse" class="response"></div>
        </div>

        <!-- Get Current User -->
        <div class="section">
            <h2>Get Current User (Me)</h2>
            <button onclick="testGetCurrentUser()">Get My Profile</button>
            <div id="getMeResponse" class="response"></div>
        </div>

        <!-- Update User Profile -->
        <div class="section">
            <h2>Update User Profile</h2>
            <div class="input-group">
                <input type="text" id="userId" placeholder="User ID (from Get Me response)">
            </div>
            <div class="input-group">
                <input type="text" id="firstName" placeholder="First Name" value="John">
                <input type="text" id="lastName" placeholder="Last Name" value="Doe">
            </div>
            <div class="input-group">
                <textarea id="bio" placeholder="Bio"
                    style="flex: 1; min-height: 60px;">Software Developer passionate about MERN stack</textarea>
            </div>
            <button onclick="testUpdateUser()">Update Profile</button>
            <div id="updateResponse" class="response"></div>
        </div>

        <!-- Create Post -->
        <div class="section">
            <h2>Create Post</h2>
            <div class="input-group">
                <textarea id="postContent" placeholder="What's on your mind?"
                    style="flex: 1; min-height: 80px;">This is my first post on ConnectHub!</textarea>
            </div>

            <div class="input-group">
                <input type="file" id="postFile" accept="image/*,video/*">
                <select id="mediaType" style="padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                    <option value="none">No Media</option>
                    <option value="image">Image</option>
                    <option value="video">Video</option>
                </select>
            </div>
            <button onclick="testCreatePost()">Create Post</button>
            <div id="createPostResponse" class="response"></div>
        </div>

        <!-- Get All Posts (Feed) -->
        <div class="section">
            <h2>Get Feed (All Posts)</h2>
            <button onclick="testGetAllPosts()">Load Feed</button>
            <div id="getAllPostsResponse" class="response"></div>
        </div>

        <!-- Get Specific Post -->
        <div class="section">
            <h2>Get Specific Post</h2>
            <div class="input-group">
                <input type="text" id="postId" placeholder="Post ID (from Feed response)">
            </div>
            <button onclick="testGetPostById()">Get Post</button>
            <div id="getPostResponse" class="response"></div>
        </div>

        <!-- Like/Unlike Post -->
        <div class="section">
            <h2>Like/Unlike Post</h2>
            <div class="input-group">
                <input type="text" id="likePostId" placeholder="Post ID to like/unlike">
            </div>
            <button onclick="testLikePost()">Toggle Like</button>
            <div id="likePostResponse" class="response"></div>
        </div>

        <!-- Delete Post -->
        <div class="section">
            <h2>Delete Post</h2>
            <div class="input-group">
                <input type="text" id="deletePostId" placeholder="Post ID to delete">
            </div>
            <button onclick="testDeletePost()">Delete Post</button>
            <div id="deletePostResponse" class="response"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://connecthub-api-jrio.onrender.com/api';

        // Utility Functions
        function displayResponse(elementId, response, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = JSON.stringify(response, null, 2);
            element.className = 'response ' + (isError ? 'error' : 'success');
        }

        function getToken() {
            return localStorage.getItem('authToken');
        }

        function setToken(token) {
            localStorage.setItem('authToken', token);
            document.getElementById('tokenDisplay').textContent = `Token: ${token}`;
        }

        function getHeaders(includeAuth = false) {
            const headers = {
                'Content-Type': 'application/json',
            };
            if (includeAuth) {
                const token = getToken();
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
            }
            return headers;
        }

        // API Tests
        async function testHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                displayResponse('healthResponse', { status: response.status, data });
            } catch (error) {
                displayResponse('healthResponse', { error: error.message }, true);
            }
        }

        async function testRegister() {
            try {
                const payload = {
                    username: document.getElementById('regUsername').value,
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value,
                    confirmPassword: document.getElementById('regConfirm').value,
                };
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(payload),
                });
                const data = await response.json();
                if (data.token) setToken(data.token);
                displayResponse('registerResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('registerResponse', { error: error.message }, true);
            }
        }

        async function testLogin() {
            try {
                const payload = {
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value,
                };
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(payload),
                });
                const data = await response.json();
                if (data.token) setToken(data.token);
                displayResponse('loginResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('loginResponse', { error: error.message }, true);
            }
        }

        async function testGetAllUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`, {
                    headers: getHeaders(true),
                });
                const data = await response.json();
                displayResponse('getAllResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('getAllResponse', { error: error.message }, true);
            }
        }

        async function testGetCurrentUser() {
            try {
                const response = await fetch(`${API_BASE}/users/me`, {
                    headers: getHeaders(true),
                });
                const data = await response.json();
                if (data.data && data.data._id) {
                    document.getElementById('userId').value = data.data._id;
                }
                displayResponse('getMeResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('getMeResponse', { error: error.message }, true);
            }
        }

        async function testUpdateUser() {
            try {
                const userId = document.getElementById('userId').value;
                if (!userId) {
                    alert('Please get your profile first to get User ID');
                    return;
                }
                const payload = {
                    profile: {
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        bio: document.getElementById('bio').value,
                    },
                };
                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    method: 'PUT',
                    headers: getHeaders(true),
                    body: JSON.stringify(payload),
                });
                const data = await response.json();
                displayResponse('updateResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('updateResponse', { error: error.message }, true);
            }
        }

        function copyToken() {
            const token = getToken();
            if (token) {
                navigator.clipboard.writeText(token);
                alert('Token copied to clipboard!');
            } else {
                alert('No token available');
            }
        }

        function clearToken() {
            localStorage.removeItem('authToken');
            document.getElementById('tokenDisplay').textContent = 'No token stored. Login first!';
        }

        // Post Functions
        async function testCreatePost() {
            try {

                const formData = new FormData();

                formData.append(
                    'content',
                    document.getElementById('postContent').value
                );

                formData.append(
                    'mediaType',
                    document.getElementById('mediaType').value
                );

                const file = document.getElementById('postFile').files[0];

                if (file) {
                    formData.append('file', file);
                }

                const response = await fetch(`${API_BASE}/posts`, {
                    method: 'POST',

                    headers: {
                        Authorization: `Bearer ${getToken()}`
                    },

                    body: formData
                });

                const data = await response.json();

                if (data.data && data.data._id) {
                    document.getElementById('postId').value = data.data._id;
                    document.getElementById('likePostId').value = data.data._id;
                    document.getElementById('deletePostId').value = data.data._id;
                }

                displayResponse(
                    'createPostResponse',
                    { status: response.status, data },
                    !response.ok
                );

            } catch (error) {
                displayResponse(
                    'createPostResponse',
                    { error: error.message },
                    true
                );
            }
        }

        async function testGetAllPosts() {
            try {
                const response = await fetch(`${API_BASE}/posts`, {
                    headers: getHeaders(true),
                });
                const data = await response.json();
                displayResponse('getAllPostsResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('getAllPostsResponse', { error: error.message }, true);
            }
        }

        async function testGetPostById() {
            try {
                const postId = document.getElementById('postId').value;
                if (!postId) {
                    alert('Please enter a Post ID');
                    return;
                }
                const response = await fetch(`${API_BASE}/posts/${postId}`, {
                    headers: getHeaders(true),
                });
                const data = await response.json();
                displayResponse('getPostResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('getPostResponse', { error: error.message }, true);
            }
        }

        async function testLikePost() {
            try {
                const postId = document.getElementById('likePostId').value;
                if (!postId) {
                    alert('Please enter a Post ID');
                    return;
                }
                const response = await fetch(`${API_BASE}/posts/${postId}/like`, {
                    method: 'PUT',
                    headers: getHeaders(true),
                });
                const data = await response.json();
                displayResponse('likePostResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('likePostResponse', { error: error.message }, true);
            }
        }

        async function testDeletePost() {
            try {
                const postId = document.getElementById('deletePostId').value;
                if (!postId) {
                    alert('Please enter a Post ID');
                    return;
                }
                const response = await fetch(`${API_BASE}/posts/${postId}`, {
                    method: 'DELETE',
                    headers: getHeaders(true),
                });
                const data = await response.json();
                displayResponse('deletePostResponse', { status: response.status, data }, !response.ok);
            } catch (error) {
                displayResponse('deletePostResponse', { error: error.message }, true);
            }
        }

        // Initialize
        window.onload = () => {
            const token = getToken();
            if (token) {
                document.getElementById('tokenDisplay').textContent = `Token: ${token}`;
            }
        };
    </script>
</body>

</html>
